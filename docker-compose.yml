version: '3.8'

services:
  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000/ws
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - dataflow

  # ── Backend (FastAPI Middleware) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=duckdb:///data/analytics.duckdb
      - POSTGRES_URL=postgresql://dataflow:dataflow@postgres:5432/dataflow
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-production
      - ENVIRONMENT=production
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - duckdb-data:/data
      - ./backend/app:/app/app
    networks:
      - dataflow

  # ── PostgreSQL (Transactional DB) ──
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dataflow
      POSTGRES_PASSWORD: dataflow
      POSTGRES_DB: dataflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dataflow

  # ── Redis (Cache + Rate Limiting) ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dataflow

  # ── Nginx (Reverse Proxy — Production) ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    profiles:
      - production
    networks:
      - dataflow

volumes:
  postgres-data:
  duckdb-data:
  redis-data:

networks:
  dataflow:
    driver: bridge
